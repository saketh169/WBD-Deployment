name: NutriConnect CI/CD

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate Controller & Route Imports
        working-directory: backend
        run: |
          echo "=== Validating Backend Imports ==="
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // All possible models and dependencies
            const allModels = ['User', 'Admin', 'Dietitian', 'Employee', 'Booking', 'Payment', 'Blog', 'ActivityLog', 'Progress', 'MealPlan', 'HealthReport', 'LabReport', 'Message', 'Conversation', 'FAQ', 'ChatHistory', 'Query', 'EmployeeQuery', 'TeamBoard', 'Settings', 'NutritionCache', 'HardcodedResponse', 'BlockedSlot', 'Organization'];
            const allControllers = ['authController', 'blogController', 'bookingController', 'chatController', 'chatbotController', 'contactusController', 'crudController', 'employeeController', 'forgotPasswordController', 'healthReportController', 'labReportController', 'mealPlanController', 'notificationController', 'paymentController', 'profileController', 'progressController', 'settingsController', 'statusController', 'teamBoardController', 'verifyController', 'analyticsController', 'activityLogController'];
            const allServices = ['otpService', 'paymentService', 'razorpayService', 'bookingService', 'emailService', 'contactService'];
            const allPackages = ['bcrypt', 'jwt', 'mongoose', 'multer', 'csv', 'nodemailer', 'axios', 'crypto', 'morgan', 'helmet', 'rateLimit', 'cloudinary', 'Razorpay', 'GoogleGenerativeAI', 'Readable', 'OAuth2Client'];
            
            const validateControllers = () => {
              const dirPath = './src/controllers';
              const files = fs.readdirSync(dirPath).filter(f => f.endsWith('.js'));
              let errors = [];
              
              files.forEach(file => {
                try {
                  const content = fs.readFileSync(path.join(dirPath, file), 'utf8');
                  const lines = content.split('\n');
                  
                  // Extract ACTIVE imports
                  const importedVars = new Set();
                  lines.forEach((line) => {
                    if (line.trim().startsWith('//')) return;
                    const requireMatch = line.match(/(?:const|let|var)\s+(\w+|\{[^}]+\})\s*=\s*require\(['\"]([^'\"]+)['\"]\)/);
                    if (requireMatch) {
                      const varPart = requireMatch[1];
                      if (varPart.includes('{')) {
                        const extracted = varPart.match(/\{([^}]+)\}/)[1];
                        extracted.split(',').forEach(v => importedVars.add(v.trim()));
                      } else {
                        importedVars.add(varPart.trim());
                      }
                    }
                  });
                  
                  // Find what controller NEEDS
                  const codeContent = lines.join('\n');
                  const needed = new Set();
                  
                  // Check models
                  allModels.forEach(model => {
                    const regex = new RegExp('\\b' + model + '\\b(?!:)', 'g');
                    if (codeContent.match(regex)) needed.add(model);
                  });
                  
                  // Check services
                  allServices.forEach(service => {
                    const regex = new RegExp('\\b' + service + '\\b', 'g');
                    if (codeContent.match(regex)) needed.add(service);
                  });
                  
                  // Check packages
                  allPackages.forEach(pkg => {
                    const regex = new RegExp('\\b' + pkg + '\\b', 'g');
                    if (codeContent.match(regex)) needed.add(pkg);
                  });
                  
                  // Verify all needed imports are present
                  needed.forEach(item => {
                    if (!importedVars.has(item)) {
                      errors.push('❌ CONTROLLER: ' + file + ' - USES \"' + item + '\" but NOT IMPORTED!');
                    }
                  });
                  
                  if (needed.size > 0) {
                    console.log('✓ ' + file + ' needs: ' + Array.from(needed).join(', '));
                  }
                  
                } catch (err) {
                  errors.push('Controller: ' + file + ': ' + err.message);
                }
              });
              
              console.log('✓ Controllers validated: ' + files.length + ' files');
              return errors;
            };
            
            const validateRoutes = () => {
              const dirPath = './src/routes';
              const files = fs.readdirSync(dirPath).filter(f => f.endsWith('.js'));
              let errors = [];
              
              files.forEach(file => {
                try {
                  const content = fs.readFileSync(path.join(dirPath, file), 'utf8');
                  const lines = content.split('\n');
                  
                  // Extract ACTIVE imports
                  const importedVars = new Set();
                  lines.forEach((line) => {
                    if (line.trim().startsWith('//')) return;
                    const requireMatch = line.match(/(?:const|let|var)\s+(\w+|\{[^}]+\})\s*=\s*require\(['\"]([^'\"]+)['\"]\)/);
                    if (requireMatch) {
                      const varPart = requireMatch[1];
                      if (varPart.includes('{')) {
                        const extracted = varPart.match(/\{([^}]+)\}/)[1];
                        extracted.split(',').forEach(v => importedVars.add(v.trim()));
                      } else {
                        importedVars.add(varPart.trim());
                      }
                    }
                  });
                  
                  // Find what route NEEDS
                  const codeContent = lines.join('\n');
                  const needed = new Set();
                  
                  // Check controllers
                  allControllers.forEach(controller => {
                    const regex = new RegExp('\\b' + controller + '\\b', 'g');
                    if (codeContent.match(regex)) needed.add(controller);
                  });
                  
                  // Check models
                  allModels.forEach(model => {
                    const regex = new RegExp('\\b' + model + '\\b(?!:)', 'g');
                    if (codeContent.match(regex)) needed.add(model);
                  });
                  
                  // Verify all needed imports are present
                  needed.forEach(item => {
                    if (!importedVars.has(item)) {
                      errors.push('❌ ROUTE: ' + file + ' - USES \"' + item + '\" but NOT IMPORTED!');
                    }
                  });
                  
                  if (needed.size > 0) {
                    console.log('✓ ' + file + ' needs: ' + Array.from(needed).join(', '));
                  }
                  
                } catch (err) {
                  errors.push('Route: ' + file + ': ' + err.message);
                }
              });
              
              console.log('✓ Routes validated: ' + files.length + ' files');
              return errors;
            };
            
            const allErrors = [];
            allErrors.push(...validateControllers());
            allErrors.push(...validateRoutes());
            
            if (allErrors.length > 0) {
              console.error('\n❌ IMPORT VALIDATION FAILED:');
              allErrors.forEach(e => console.error(e));
              process.exit(1);
            }
            console.log('\n✓ All imports validated successfully');
          "

      - name: Lint backend code
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: backend
        run: npm test
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Generate test coverage report
        working-directory: backend
        run: npm run test:coverage
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Frontend Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_TINYMCE_API_KEY: ${{ secrets.VITE_TINYMCE_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Docker Build Verification
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t nutriconnect-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t nutriconnect-frontend ./frontend

      - name: Verify docker-compose config
        run: docker compose config
