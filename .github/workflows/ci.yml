name: NutriConnect CI/CD

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate All Required Imports
        working-directory: backend
        run: |
          echo "=== Validating Required Imports ==="
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          const validateDirectory = (dirPath, dirName) => {
            if (!fs.existsSync(dirPath)) {
              console.warn('⚠ ' + dirName + ' directory not found');
              return true;
            }
            
            const files = fs.readdirSync(dirPath).filter(f => f.endsWith('.js'));
            let errors = [];
            
            files.forEach(file => {
              try {
                const filePath = path.join(dirPath, file);
                const content = fs.readFileSync(filePath, 'utf8');
                const lines = content.split('\n');
                
                // Extract declared variables from active imports
                const declaredVars = new Set();
                
                lines.forEach((line, idx) => {
                  // Skip commented lines
                  const trimmed = line.trim();
                  if (trimmed.startsWith('//')) return;
                  
                  // Match: const X = require(...) or const { X, Y } = require(...)
                  const match = line.match(/(?:const|let|var)\s+([{}\w,\s]+)\s*=\s*require\(['"]([^'"]+)['"]\)/);
                  if (match) {
                    const vars = match[1].trim();
                    
                    if (vars.includes('{')) {
                      const extracted = vars.match(/\{([^}]+)\}/)[1];
                      extracted.split(',').forEach(v => {
                        const cleaned = v.trim().split(' as ')[0].trim();
                        if (cleaned) declaredVars.add(cleaned);
                      });
                    } else {
                      if (vars) declaredVars.add(vars);
                    }
                    
                    console.log('✓ ' + file + ' imported: ' + vars);
                  }
                });
                
                // Get code after imports
                const codeContent = lines.filter(l => !l.match(/require\(/)).join('\n');
                
                // Check each declared variable is actually used
                declaredVars.forEach(varName => {
                  const regex = new RegExp('\\b' + varName + '\\b');
                  if (!regex.test(codeContent)) {
                    errors.push(file + ': Unused import: ' + varName);
                  }
                });
                
              } catch (err) {
                errors.push(file + ': ' + err.message);
              }
            });
            
            console.log('✓ ' + dirName + ' validated: ' + files.length + ' files');
            
            if (errors.length > 0) {
              console.error('\n✗ ' + dirName + ' errors:');
              errors.forEach(e => console.error('  - ' + e));
              return false;
            }
            return true;
          };
          
          const allValid = 
            validateDirectory('./src/controllers', 'Controllers') &&
            validateDirectory('./src/routes', 'Routes') &&
            validateDirectory('./src/services', 'Services') &&
            validateDirectory('./src/middlewares', 'Middlewares');
          
          if (!allValid) {
            console.error('\n✗ Import validation FAILED');
            process.exit(1);
          }
          console.log('\n✓ All imports validated successfully');
          EOF

      - name: Lint backend code
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: backend
        run: npm test
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Generate test coverage report
        working-directory: backend
        run: npm run test:coverage
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Frontend Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_TINYMCE_API_KEY: ${{ secrets.VITE_TINYMCE_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Docker Build Verification
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t nutriconnect-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t nutriconnect-frontend ./frontend

      - name: Verify docker-compose config
        run: docker compose config
