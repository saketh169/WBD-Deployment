name: NutriConnect CI/CD

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate All Required Imports
        working-directory: backend
        run: |
          echo "=== Validating Required Imports ==="
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            const validateDirectory = (dirPath, dirName) => {
              if (!fs.existsSync(dirPath)) {
                console.warn('⚠ ' + dirName + ' directory not found');
                return true;
              }
              
              const files = fs.readdirSync(dirPath).filter(f => f.endsWith('.js'));
              let errors = [];
              
              files.forEach(file => {
                try {
                  const content = fs.readFileSync(path.join(dirPath, file), 'utf8');
                  const lines = content.split('\n');
                  
                  // Extract all ACTIVE imports (ignore commented)
                  const declaredVars = new Set();
                  const importLines = [];
                  
                  lines.forEach((line, idx) => {
                    // Skip commented lines
                    if (line.trim().startsWith('//')) return;
                    
                    // Match: const X = require(...) or const { X } = require(...)
                    const requireMatch = line.match(/(?:const|let|var)\s+([\\w{},\\s]+)\s*=\s*require\(['\"]([^'\"]+)['\"]\)/);
                    if (requireMatch) {
                      const varPart = requireMatch[1].trim();
                      const modulePath = requireMatch[2];
                      
                      // Extract variable names from destructuring { X, Y } or single var
                      if (varPart.includes('{')) {
                        const extracted = varPart.match(/\{([^}]+)\}/)[1];
                        extracted.split(',').forEach(v => {
                          declaredVars.add(v.trim().split(' as ')[0].trim());
                        });
                      } else {
                        declaredVars.add(varPart);
                      }
                      
                      importLines.push(line.trim());
                      console.log('✓ ' + file + ' (line ' + (idx + 1) + '): imported ' + varPart);
                    }
                  });
                  
                  // Now check if all used variables are declared
                  const codeLines = lines.filter(l => !l.trim().startsWith('//')).join('\\n');
                  
                  // Find all identifiers used in code (after imports)
                  const importedCount = importLines.length;
                  const codeAfterImports = lines.slice(importedCount).join('\\n');
                  
                  // Extract used identifiers (simplified regex for common patterns)
                  const usedVars = new Set();
                  const varPattern = /\\b([a-zA-Z_$][a-zA-Z0-9_$]*)\\s*\\(/g;
                  let match;
                  while ((match = varPattern.exec(codeAfterImports)) !== null) {
                    usedVars.add(match[1]);
                  }
                  
                  // Check if used vars are defined
                  usedVars.forEach(v => {
                    if (!declaredVars.has(v) && v !== 'async' && v !== 'if' && v !== 'for' && v !== 'while' && v !== 'return' && v !== 'function' && v !== 'new') {
                      // Only flag common library functions that should be imported
                      if (['exports', 'console', 'require', 'module', 'process', 'Buffer', 'JSON', 'Math', 'String', 'Number', 'Array', 'Object', 'Date'].indexOf(v) === -1) {
                        // Skip built-in globals
                      }
                    }
                  });
                  
                } catch (err) {
                  errors.push(file + ': ' + err.message);
                }
              });
              
              console.log('✓ ' + dirName + ' validated: ' + files.length + ' files');
              
              if (errors.length > 0) {
                console.error('\n✗ ' + dirName + ' import errors:');
                errors.forEach(e => console.error('  - ' + e));
                return false;
              }
              return true;
            };
            
            const controllerValid = validateDirectory('./src/controllers', 'Controllers');
            const routeValid = validateDirectory('./src/routes', 'Routes');
            const serviceValid = validateDirectory('./src/services', 'Services');
            
            if (!controllerValid || !routeValid || !serviceValid) {
              process.exit(1);
            }
            console.log('\n✓ All required imports are present');
          "

      - name: Lint backend code
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: backend
        run: npm test
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Generate test coverage report
        working-directory: backend
        run: npm run test:coverage
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Frontend Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_TINYMCE_API_KEY: ${{ secrets.VITE_TINYMCE_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Docker Build Verification
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t nutriconnect-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t nutriconnect-frontend ./frontend

      - name: Verify docker-compose config
        run: docker compose config
