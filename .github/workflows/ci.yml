name: NutriConnect CI/CD

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate Controller & Route Imports
        working-directory: backend
        run: |
          echo "=== Validating Backend Imports ==="
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Common patterns to detect missing imports
            const commonModels = ['User', 'Admin', 'Dietitian', 'Employee', 'Booking', 'Payment', 'Blog', 'ActivityLog'];
            
            const validateDirectory = (dirPath, dirName) => {
              if (!fs.existsSync(dirPath)) {
                console.warn('⚠ ' + dirName + ' directory not found');
                return true;
              }
              
              const files = fs.readdirSync(dirPath).filter(f => f.endsWith('.js'));
              let errors = [];
              let validCount = 0;
              
              files.forEach(file => {
                try {
                  const content = fs.readFileSync(path.join(dirPath, file), 'utf8');
                  const lines = content.split('\n');
                  
                  // Extract ONLY ACTIVE (uncommented) imported variables
                  const importedVars = new Set();
                  
                  lines.forEach((line, idx) => {
                    // Skip commented lines - they are MISSING
                    if (line.trim().startsWith('//')) return;
                    
                    const requireMatch = line.match(/(?:const|let|var)\s+(\w+|\{[^}]+\})\s*=\s*require\(['\"]([^'\"]+)['\"]\)/);
                    if (requireMatch) {
                      const varPart = requireMatch[1];
                      
                      // Extract variable names
                      if (varPart.includes('{')) {
                        const extracted = varPart.match(/\{([^}]+)\}/)[1];
                        extracted.split(',').forEach(v => importedVars.add(v.trim()));
                      } else {
                        importedVars.add(varPart.trim());
                      }
                      
                      console.log('✓ ' + file + ' imports: ' + varPart);
                      validCount++;
                    }
                  });
                  
                  // Check if code uses models that aren't in ACTIVE imports
                  const codeContent = lines.join('\n');
                  
                  commonModels.forEach(model => {
                    // Check if model is used in code
                    const regex = new RegExp('\\b' + model + '\\b(?!:)', 'g');
                    const usages = codeContent.match(regex) || [];
                    
                    if (usages.length > 0 && !importedVars.has(model)) {
                      errors.push('❌ ' + file + ' - USES \"' + model + '\" but NO ACTIVE IMPORT FOUND (may be commented out)!');
                    }
                  });
                  
                } catch (err) {
                  errors.push(file + ': ' + err.message);
                }
              });
              
              console.log('✓ ' + dirName + ' validated: ' + files.length + ' files, ' + validCount + ' active imports');
              
              if (errors.length > 0) {
                console.error('\n❌ MISSING IMPORTS DETECTED:');
                errors.forEach(e => console.error(e));
                return false;
              }
              return true;
            };
            
            const controllerValid = validateDirectory('./src/controllers', 'Controllers');
            const routeValid = validateDirectory('./src/routes', 'Routes');
            const serviceValid = validateDirectory('./src/services', 'Services');
            const middlewareValid = validateDirectory('./src/middlewares', 'Middlewares');
            
            if (!controllerValid || !routeValid || !serviceValid || !middlewareValid) {
              console.error('\n❌ CRITICAL: Missing required imports detected (may be commented out)!');
              process.exit(1);
            }
            console.log('\n✓ All imports validated successfully');
          "

      - name: Lint backend code
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        working-directory: backend
        run: npm test
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Generate test coverage report
        working-directory: backend
        run: npm run test:coverage
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          JWT_SECRET: ci_test_secret_key
          EMAIL_USER: test@test.com
          EMAIL_PASS: test_password

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Frontend Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint check
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Build frontend for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_TINYMCE_API_KEY: ${{ secrets.VITE_TINYMCE_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Docker Build Verification
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t nutriconnect-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t nutriconnect-frontend ./frontend

      - name: Verify docker-compose config
        run: docker compose config
