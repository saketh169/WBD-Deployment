services:
  # ── Backend API Server ──
  backend:
    build: ./backend
    container_name: wbd-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT:-5000}
      - MONGODB_URL=${MONGODB_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://localhost:3000}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - USDA_API_KEY=${USDA_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_SIGNIN_KEY=${ADMIN_SIGNIN_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - redis
      - elasticsearch
    restart: unless-stopped
    networks:
      - wbd-network

  # ── Frontend (React + Nginx) ──
  frontend:
    build: ./frontend
    container_name: wbd-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://backend:5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wbd-network


  # ── Redis Cache ──
  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: wbd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - wbd-network

  # ── Elasticsearch ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: wbd-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - wbd-network

  # ── Swagger UI ──
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: wbd-swagger
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON=/swagger.json
      - URL=http://localhost:5000/api-docs
      - URLS=[{"url":"http://localhost:5000/api-docs","name":"WBD API"}]
    volumes:
      - ./backend/swagger.json:/swagger.json:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wbd-network

volumes:
  redis_data:
    driver: local
  elastic_data:
    driver: local

networks:
  wbd-network:
    driver: bridge
